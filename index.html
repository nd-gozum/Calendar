<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Date — Maki & Nikole</title>
  <meta name="description" content="Maki & Nikole are getting married. Save the date: May 25, 2028.">
  <meta property="og:title" content="Save the Date — Maki & Nikole">
  <meta property="og:description" content="We're getting married. May 25, 2028 · Kastelo Verde, Capas, Tarlac">
  <meta name="theme-color" content="#FAF7F3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #FAF7F3;
      --blush: #D4A4A8;
      --fern: #9DAE91;
      --bark: #4A4540;
      --sky: #B0C4D4;
      --petal: #F3EDE8;
      --dusk: #D8CFC6;
      --stone: #8A847B;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--bark);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 480px;
      margin: 24px;
      position: relative;
      text-align: center;
      padding: 64px 32px 56px;
    }
    @media (min-width: 520px) {
      .card { padding: 80px 48px 64px; }
    }

    /* ── Botanical corners ── */
    .botanical {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.88);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    .botanical.visible {
      opacity: 1;
      transform: scale(1);
    }
    .botanical--tl {
      top: -24px; left: -32px;
      width: 200px; height: 260px;
      transition-delay: 0.4s;
    }
    .botanical--br {
      bottom: -24px; right: -32px;
      width: 200px; height: 260px;
      transition-delay: 0.6s;
    }
    .botanical--tr {
      top: 20px; right: -20px;
      width: 120px; height: 160px;
      transition-delay: 0.7s;
    }
    .botanical--bl {
      bottom: 20px; left: -20px;
      width: 120px; height: 160px;
      transition-delay: 0.5s;
    }

    /* ── Content ── */
    .content {
      position: relative;
      z-index: 1;
    }

    .label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 40px;
      opacity: 0;
      transition: opacity 0.7s ease 0.3s;
    }
    .label.visible { opacity: 1; }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(44px, 10vw, 72px);
      line-height: 1.1;
      color: var(--bark);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease 0.15s, transform 0.8s ease 0.15s;
    }
    .names.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
      opacity: 0;
      transition: opacity 0.7s ease 0.5s;
    }
    .divider.visible { opacity: 1; }
    .divider__line {
      width: 40px;
      height: 1px;
      background: var(--dusk);
    }

    .date {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(20px, 4vw, 28px);
      letter-spacing: 0.15em;
      color: var(--bark);
      margin-bottom: 8px;
      opacity: 0;
      transition: opacity 0.7s ease 0.6s;
    }
    .date.visible { opacity: 1; }

    .date-written {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 16px;
      color: var(--stone);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
      opacity: 0;
      transition: opacity 0.7s ease 0.7s;
    }
    .date-written.visible { opacity: 1; }

    .venue {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--stone);
      letter-spacing: 0.05em;
      margin-bottom: 48px;
      opacity: 0;
      transition: opacity 0.7s ease 0.8s;
    }
    .venue.visible { opacity: 1; }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 48px;
      opacity: 0;
      transition: opacity 0.7s ease 0.9s;
    }
    .countdown.visible { opacity: 1; }
    .countdown__item { min-width: 48px; text-align: center; }
    .countdown__number {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 30px;
      color: var(--bark);
      line-height: 1.2;
    }
    .countdown__label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--stone);
      margin-top: 4px;
    }

    /* ── Message ── */
    .message {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 17px;
      line-height: 1.7;
      color: var(--bark);
      margin-bottom: 40px;
      opacity: 0;
      transition: opacity 0.7s ease 1s;
    }
    .message.visible { opacity: 1; }

    .closing-note {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--stone);
      opacity: 0;
      transition: opacity 0.7s ease 1.1s;
    }
    .closing-note.visible { opacity: 1; }

    /* ── Border frame ── */
    .frame {
      position: absolute;
      inset: 12px;
      border: 1px solid var(--dusk);
      border-radius: 2px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease 0.2s;
    }
    .frame.visible { opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
      .botanical, .label, .names, .divider, .date, .date-written,
      .venue, .countdown, .message, .closing-note, .frame {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>

<body>

        <g opacity="0.5">

    </div>

    <div class="botanical botanical--tr" id="botTR">

    <!-- Content -->
    <div class="content">
      <p class="label" id="elLabel">Save the Date</p>

      <h1 class="names" id="elNames">Maki & Nikole</h1>

      <div class="divider" id="elDivider">
        <div class="divider__line"></div>
        <svg viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="32">

      <p class="date" id="elDate">05 - 25 - 28</p>
      <p class="venue" id="elVenue">Kastelo Verde · Capas, Tarlac</p>

      <div class="countdown" id="elCountdown">
        <div class="countdown__item">
          <div class="countdown__number" id="cDays">0</div>

        <div class="countdown__item">
          <div class="countdown__number" id="cHours">0</div>

        </div>
        <div class="countdown__item">
          <div class="countdown__number" id="cMins">0</div>
          <div class="countdown__label">Min</div>
        </div>

  <script>
    // ── Entrance ──
    window.addEventListener('load', function() {
      setTimeout(function() {
        var ids = ['frame', 'botTL', 'botBR', 'botTR', 'botBL', 'elLabel', 'elNames', 'elDivider', 'elDate', 'elDateWritten', 'elVenue', 'elCountdown', 'elMessage', 'elClosing'];
        ids.forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.classList.add('visible');
        });
      }, 150);
    });

    // ── Countdown ──
    (function() {
      var wedding = new Date('2028-05-25T09:00:00+08:00');
      function tick() {
        var diff = wedding - new Date();
        if (diff <= 0) { return; }
        document.getElementById('cDays').textContent = Math.floor(diff / 86400000);
        document.getElementById('cHours').textContent = Math.floor((diff % 86400000) / 3600000);
        document.getElementById('cMins').textContent = Math.floor((diff % 3600000) / 60000);
        document.getElementById('cSecs').textContent = Math.floor((diff % 60000) / 1000);
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>

</html>
